name: Build Mac DMG

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build app icon
        run: |
          brew install librsvg
          mkdir -p artifacts/scribe/build
          rsvg-convert -w 1024 -h 1024 artifacts/scribe/build/icon.svg -o artifacts/scribe/build/icon.png
          mkdir -p /tmp/Journal.iconset
          for size in 16 32 128 256 512; do
            sips -z $size $size artifacts/scribe/build/icon.png --out /tmp/Journal.iconset/icon_${size}x${size}.png
            sips -z $((size*2)) $((size*2)) artifacts/scribe/build/icon.png --out /tmp/Journal.iconset/icon_${size}x${size}@2x.png
          done
          iconutil -c icns -o artifacts/scribe/build/icon.icns /tmp/Journal.iconset
          echo "Icon built: $(ls -lh artifacts/scribe/build/icon.icns)"

      - name: Build DMG
        run: pnpm --filter @workspace/scribe run electron:build

      - name: Rename artifacts (strip arch suffix)
        run: |
          cd artifacts/scribe/dist/release
          for f in *-arm64.dmg *-arm64-mac.zip; do
            [ -f "$f" ] && mv "$f" "${f/-arm64/}" && echo "Renamed $f"
          done
          ls -lh

      - name: Upload DMG as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Journal-dmg
          path: artifacts/scribe/dist/release/*.dmg
          retention-days: 30

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.1
          name: Journal 1.0.1
          draft: false
          prerelease: false
          token: ${{ secrets.GH_PUSH_TOKEN }}
          files: |
            artifacts/scribe/dist/release/*.dmg
            artifacts/scribe/dist/release/*.zip
