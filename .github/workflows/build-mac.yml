name: Build Mac DMG

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-13  # Intel (x64) runner

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Build DMG
        run: pnpm --filter @workspace/scribe run electron:build

      - name: Upload DMG as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Journal-dmg
          path: artifacts/scribe/dist/release/*.dmg
          retention-days: 30

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/scribe/dist/release/*.dmg
            artifacts/scribe/dist/release/*.zip
